# Rime schema
# encoding: utf-8
# https://github.com/gaboolic/rime-shuangpin-fuzhuma


schema:
  schema_id: rime_frost_moqi_single_xh
  name: 白霜|墨奇音形·鹤拼
  version: "2024-05-11"
  author:
    - gaboolic
  description: |
    墨奇辅助码·顶屏版·小鹤双拼，为了4码自动上屏 只收录了8000字 https://github.com/gaboolic/rime-shuangpin-fuzhuma/wiki/%E5%A2%A8%E5%A5%87%E7%A0%81%E6%8B%86%E5%88%86%E8%A7%84%E5%88%99
  dependencies:
    - reverse_moqima
    - radical_flypy
    - cangjie5
    - stroke
    - zrlf
    - emoji
    - easy_en
    - jp_sela

switches:
    - name: ascii_mode
      states: [ 中文, 英文 ]
    - name: full_shape
      states: [ 半角, 全角 ]
    - name: traditionalization
      states: [ 简, 繁 ]
    - name: emoji
      states: [ 💀, 😄 ]
    - name: chaifen
      states: [ 不拆, 扌斥 ]
    - name: mars
      reset: 0
      states: [ 地, 煋 ] #火星文
    - name: ascii_punct
      states: [ 。，, ．， ]

engine:
    processors:
      - ascii_composer
      - recognizer
      - lua_processor@*sbxlm.popping
      - lua_processor@*sbxlm.key_binder # 绑定按键
      - key_binder
      - speller
      - punctuator
      - selector
      - navigator
      - express_editor
    segmentors:
      - ascii_segmentor
      - matcher
      - abc_segmentor
      - punct_segmentor
      - affix_segmentor@emojis
      - affix_segmentor@verbatim ## not as the last of this list
      - affix_segmentor@easy_en_simp
      - affix_segmentor@jp_sela
      - fallback_segmentor
    translators:
      - punct_translator
      - table_translator@custom_phrase
      - table_translator@custom_phrase_3_code
      - table_translator@custom_phrase_kf
      - table_translator@custom_phrase_mqzg
      - table_translator@custom_phrase_super_1jian
      - table_translator@custom_phrase_super_2jian
      - table_translator@custom_phrase_super_3jian
      - table_translator@custom_phrase_super_3jian_no_conflict
      - table_translator@big_char
      - reverse_lookup_translator
      - reverse_lookup_translator@reverse_moqima
      - reverse_lookup_translator@radical_flypy
      - reverse_lookup_translator@reverse_stroke
      - reverse_lookup_translator@reverse_zrlf
      - reverse_lookup_translator@reverse_cj
      - table_translator
      - lua_translator@*date_translator    # 时间、日期、星期
      - lua_translator@*lunar              # 农历
      - table_translator@emojis ## 添加注释后：停用ae模式emoji输入
      - table_translator@easy_en_simp ## 添加注释后：停用单词输入
      - table_translator@jp_sela ## 添加注释后：停用日语输入
      - lua_translator@*unicode            # Unicode
      - lua_translator@*number_translator  # 数字、金额大写
      - lua_translator@*calculator    # 计算器
    filters:
      # tab置顶词回显在第一个comment中
      - lua_filter@*stick 
      - lua_filter@*long_word_filter                   # 长词优先（顺序要求：长词优先 > Emoji）
      - simplifier@emoji                              # Emoji
      # - lua_filter@*reduce_emoji_filter   # 按需启用，作用是降低Emoji在候选项中的位置排序(顺序要求：Emoji > 降低排序)
      - simplifier@chaifen
      - simplifier@chaifen_all
      - simplifier@chinese_english
      - simplifier@traditionalize                     # 简繁切换
      - simplifier@mars                               #火星文
      - uniquifier

custom_phrase:
  dictionary: ""
  user_dict: custom_phrase/custom_phrase
  db_class: stabledb
  enable_completion: false
  enable_sentence: false
  initial_quality: 100000

# 无冲突的3简
custom_phrase_super_3jian_no_conflict:
  dictionary: ""
  user_dict: custom_phrase/custom_phrase_super_3jian_no_conflict
  db_class: stabledb
  enable_sentence: false
  enable_completion: false
  initial_quality: -1 #本表词和系统词重码居后

# 无冲突的4简
custom_phrase_super_4jian_no_conflict:
  dictionary: ""
  user_dict: custom_phrase/custom_phrase_super_4jian_no_conflict
  db_class: stabledb
  enable_sentence: false
  enable_completion: false
  initial_quality: -1 #本表词和系统词重码居后
  # initial_quality: 1 #比系统词靠后，比无词靠前  等后面4jian_no_conflict只留下成语和常用词，再改为1

# 快符
custom_phrase_kf:
  dictionary: ""
  user_dict: custom_phrase/custom_phrase_kf
  db_class: stabledb
  enable_sentence: false
  enable_completion: false
  initial_quality: -1 #本表词和系统词重码居后

# 字根
custom_phrase_mqzg:
  dictionary: ""
  user_dict: custom_phrase/custom_phrase_mqzg
  db_class: stabledb
  enable_sentence: false
  enable_completion: false
  initial_quality: -1 #本表词和系统词重码居后

# 超强tab 1码
custom_phrase_super_1jian:
  dictionary: ""
  user_dict: custom_phrase/custom_phrase_super_1jian
  db_class: stabledb
  enable_sentence: false
  enable_completion: false
  initial_quality: -1 #本表词和系统词重码居后

# 超强tab 2码
custom_phrase_super_2jian:
  dictionary: ""
  user_dict: custom_phrase/custom_phrase_super_2jian
  db_class: stabledb
  enable_sentence: false
  enable_completion: false
  initial_quality: -1 #本表词和系统词重码居后

# 超强tab 3码
custom_phrase_super_3jian:
  dictionary: ""
  user_dict: custom_phrase/custom_phrase_super_3jian
  db_class: stabledb
  enable_sentence: false
  enable_completion: false
  initial_quality: -1 #本表词和系统词重码居后

reverse_moqima:
  tag: reverse_moqima
  dictionary: reverse_moqima
  enable_completion: true
  prefix: "amq"
  suffix: "'"
  tips: 〔墨奇反查〕
  preedit_format:
    # - xlit/hspnz/一丨丿丶乙/

radical_flypy:
  tag: radical_flypy
  dictionary: radical_flypy # https://github.com/mirtlecn/rime-radical-pinyin
  enable_completion: true
  prefix: "az"
  suffix: "'"
  tips: 〔部件组字〕
  preedit_format:
    # - xlit/hspnz/一丨丿丶乙/

reverse_zrlf:
  tag: reverse_zrlf
  dictionary: zrlf
  enable_completion: true
  prefix: "alf"
  suffix: "'"
  tips: 〔自然兩分〕
  preedit_format:
    # - xlit/hspnz/一丨丿丶乙/

reverse_cj:
  tag: reverse_cj
  dictionary: cangjie5
  enable_completion: true
  prefix: "arj"
  suffix: "'"
  tips: 〔仓颉〕
  preedit_format:
    - xform/^arj/仓颉5:/
    - xlit|abcdefghijklmnopqrstuvwxyz|日月金木水火土竹戈十大中一弓人心手口尸廿山女田難卜符|

reverse_stroke:
  tag: reverse_stroke
  dictionary: stroke # stroke
  enable_completion: true
  prefix: "ab"
  suffix: "'"
  tips: 〔筆畫hspnz〕 # 〔筆畫〕
  preedit_format:
    - xlit/hspnz/一丨丿丶乙/

reverse_lookup:
  tags: [ reverse_moqima,radical_flypy,reverse_stroke,reverse_zrlf,reverse_cj]
  overwrite_comment: true
  # 可以改为全拼+音调+释义的码表
  dictionary: moqi_wan.extended # 提示码词表

# 显示墨奇码拆分
chaifen:
  option_name: chaifen
  opencc_config: moqi_chaifen.json
  tips: char
  show_in_comment: true
  comment_format:
    - "xform/	/ /"

chaifen_all:
  option_name: chaifen_all
  opencc_config: moqi_chaifen_all.json
  tips: char
  show_in_comment: true
  comment_format:
    - "xform/	/ /"

# 中文转英文
chinese_english:
  option_name: chinese_english
  opencc_config: chinese_english.json
  tips: char
  comment_format:
    - "xform/-/ /"

# Emoji
emoji:
  option_name: emoji
  opencc_config: emoji.json
  inherit_comment: false  # 在 corrector.lua 及反查中，emoji 返回空注释

# 简繁切换
traditionalize:
  option_name: traditionalization
  opencc_config: s2t.json  # s2t.json | s2hk.json | s2tw.json | s2twp.json
  tips: none               # 转换提示: all 都显示 | char 仅单字显示 | none 不显示。
  tags: [ abc, number, gregorian_to_lunar ]  # 限制在对应 tag，不对其他如反查的内容做简繁转换

# 火星文切换
mars:
  opencc_config: martian.json
  option_name: mars

# 标点符号
# punctuator 下面有三个子项：
#   full_shape 全角标点映射
#   half_shape 半角标点映射
#   symbols    Rime 的预设配置是以 '/' 前缀开头输出一系列字符。
punctuator:
  full_shape:
    __include: default:/punctuator/full_shape  # 从 default.yaml 导入配置
  half_shape:
    __include: default:/punctuator/half_shape  # 从 default.yaml 导入配置
  symbols:
    __include: symbols_v:/symbols              # 从 symbols_v.yaml 导入配置

recognizer:
  # import_preset: default
  patterns:
    uppercase: "^[A-Z].*$"
    punct: '^/([0-9]|10|[A-z]+)$'
    ## 拆字、笔画、仓颉:
    reverse_moqima: "^amq[A-Za-z]*$" # "[[]b[a-z]*'?$"
    radical_flypy: "^az[a-z]*'?$" # "[[]b[a-z]*'?$"
    reverse_stroke: "^ab[A-Za-z]*$"
    reverse_cj: "^arj[A-Za-z]*$"
    reverse_zrlf: "^alf[A-Za-z]*$"
    #造词
    add_user_dict: "^ac[A-Za-z]*$"

    emojis: "^ae[a-z]*'?$" # "^ae.*$"
    easy_en_simp: "^aw[a-z]*"
    jp_sela: "^aj[a-z]*"
    card_number: "^C[0-9]+"              # 脚本将自动获取第 2 个字符 C 作为触发前缀
    unicode: "^U[a-f0-9]+"              # 脚本将自动获取第 2 个字符 U 作为触发前缀，响应 lua_translator@unicode，输出 Unicode 字符
    number: "^R[0-9]+[.]?[0-9]*"        # 脚本将自动获取第 2 个字符 R 作为触发前缀，响应 lua_translator@number_translator，数字金额大写
    gregorian_to_lunar: "^N[0-9]{1,8}"  # 脚本将自动获取第 2 个字符 N 作为触发前缀，响应 lua_translator@lunar，公历转农历，输入 N20240115 得到「二〇二三年腊月初五」

emojis:
  tag: emojis
  dictionary: emoji
  enable_completion: true
  prefix: "ae"
  #suffix: "'"
  tips: " Emoji"

easy_en_simp:
  tag: easy_en_simp
  dictionary: easy_en
  enable_completion: true
  enable_sentence: false
  prefix: "aw"
  # suffix: "'"
  tips: "英文单词（可去元音）"
  spelling_hints: 9
  comment_format:
    - xform/^.+$//

jp_sela:
  tag: jp_sela
  dictionary: jp_sela
  enable_completion: true
  enable_sentence: false
  prefix: "aj"
  # suffix: "'"
  tips: "日语"
  spelling_hints: 9
  comment_format:
    - xform/^.+$//

# 计算器触发关键字
calculator:
  trigger: V

# Lua 配置: 日期、时间、星期、ISO 8601、时间戳的触发关键字
date_translator:
  date: date            # 日期： 2022-11-29
  time: time            # 时间： 18:13
  week: week            # 星期： 星期二
  datetime: datetime    # ISO 8601： 2022-11-29T18:13:11+08:00
  timestamp: timestamp  # 时间戳： 1669716794

# Lua 配置：农历的触发关键字
lunar: anl  # 农历： 二〇二三年冬月二十 癸卯年（兔）冬月二十

# Lua 配置：长词优先
# 提升 count 个词语，插入到第 idx 个位置。
# 示例：将 2 个词插入到第 1  个候选项，输入 总算 得到「1总算 2纵」
long_word_filter:
  count: 2
  idx: 1

speller:
  popping:
    - {accept: "[a-z]", match: "[a-df-zA-DF-Z]\\w{3}"}
  # 如果不想让什么标点直接上屏，可以加在 alphabet，或者编辑标点符号为两个及以上的映射
  alphabet: zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA[/|
  # initials 定义仅作为始码的按键，排除 ` 让单个的 ` 可以直接上屏
  initials: zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA
  # 第一位<空格>是拼音之间的分隔符；第二位<'>表示可以手动输入单引号来分割拼音。
  delimiter: " '"
  max_code_length: 5
  auto_select: true   #顶字上屏
  auto_select_pattern: ^;.$|^[a-df-zA-DF-Z]\w{3}|^e\w{4}

  auto_select_unique_candidate: true
  auto_clear: max_length #manual|auto|max_length 空码按下一键确认清屏|空码自动清|达到最长码时后码顶上清屏
  ## speller 未允许 aj 表示 an
  algebra:
    # - xform/^([aoe])$/$1$1/
    # - xform/^(ang)$/ah/
    # - xform/^([^\[]*)iu$/$1Q/
    # - xform/^([^\[]*)ei$/$1W/
    # - xform/uan$/R/
    # - xform/^([^\[]*)[uv]e$/$1T/
    # - xform/^([^\[]*)un$/$1Y/
    # - xform/^sh([^\[]+)/U$1/
    # - xform/^ch([^\[]+)/I$1/
    # - xform/^zh([^\[]+)/V$1/
    # - xform/^([^\[]*)uo$/$1O/
    # - xform/^([^\[]*)ie$/$1P/
    # - xform/i?ong$/S/
    # - xform/ing$|uai$/K/
    # - xform/^([^\[]+)ai$/$1D/
    # - xform/^([^\[]+)en$/$1F/
    # - xform/^([^\[]+)eng$/$1G/
    # - xform/[iu]ang$/L/
    # - xform/(.)ang$/$1H/
    # - xform/^([^\[]*)ian$/$1M/
    # - xform/^([^\[]+)an$/$1J/
    # - xform/^([^\[]+)ou$/$1Z/
    # - xform/^([^\[]*)[iu]a$/$1X/
    # - xform/^([^\[]*)iao$/$1N/
    # - xform/^([^\[]+)ao$/$1C/
    # - xform/^([^\[]*)ui$/$1V/
    # - xform/^([^\[]*)in$/$1B/
    # - xlit/QWRTYUIOPSDFGHJKLZXCVBNM/qwrtyuiopsdfghjklzxcvbnm/

    # 模糊音 可选择性开启
    # - derive/^z([a-z])/v$1/
    # - derive/^c([a-z])/i$1/
    # - derive/^s([a-z])/u$1/
    # - derive/^v([a-z])/z$1/
    # - derive/^i([a-z])/c$1/
    # - derive/^u([a-z])/s$1/

    # - derive/^([jqxy])u/$1v/

    ## 飞键 可选择性开启
    - derive/^([y])j/$1f/
    - derive/^qx/qw/
    - derive/^qq/qo/
    - derive/^ww/wi/
    # - derive/^jn/jv/
    # - derive/^mn/mv/
    # - derive/^jm/jz/
    - derive/^([y])h/$1g/
    # - derive/^([rgv])f/$1m/
    - derive/^([rgv])c/$1n/


    
    

translator:
  dictionary: rime_frost_moqi_single_xh
  enable_completion: false
  db_class: tabledb
  enable_charset_filter: false
  enable_sentence: false
  ##  默认为不超过 2 个字的候选项显示输入码；将 2 改为 0 可关闭编码提示，
  ##  改为 1 则是只显示单字的输入码，依此类推。
  spelling_hints: 1
  comment_format:
    - "xform/[a-z]{2}([a-z]{2})/$1/" ## 编码提示只显示辅助码部分

  enable_user_dict: false # 是否开启自动调频
  preedit_format:
    # 复制用户输入, 一份转大写保持原样, 一份由正则转为全拼显示
