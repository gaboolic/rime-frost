# Rime schema
# encoding: utf-8


# 方案说明
schema:
  schema_id: rime_frost_wubi86
  name: 白霜五笔86
  version: "2026-04-26"
  author:
    - 创始人 王永民先生
    - gaboolic 重制词库
  description: |
    白霜五笔86
  dependencies:
    - melt_eng        # 英文输入
    - radical_pinyin  # 部件拆字反查


# 开关
switches:
  - name: ascii_mode
    states: [ 中文, 英文 ]
  - name: traditionalization
    states: [ 简体, 繁体 ]
  - name: full_shape
    states: [ 半角, 全角 ]
  - name: ascii_punct  # 中英标点
    states: [ 。，, ．， ]

  - name: emoji
    states: [ 💀, 😄 ]

  - name: chinese_english
    states: [ 翻译关, 翻译开 ]

  - name: mars
    reset: 0
    states: [ 地, 煋 ] #火星文

  - name: chaifen
    states: [ 拆分不提示, 拆分提示 ]


# 输入引擎
engine:
  processors:
    - lua_processor@*select_character          # 以词定字
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - affix_segmentor@radical_lookup  # 部件拆字自定义 tag
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - table_translator
    - lua_translator@*date_translator    # 时间、日期、星期
    - lua_translator@*lunar              # 农历
    - table_translator@custom_phrase    # 自定义短语 custom_phrase.txt
    - table_translator@melt_eng         # 英文输入
    - table_translator@radical_lookup   # 部件拆字反查
    - lua_translator@*unicode            # Unicode
    - lua_translator@*number_translator  # 数字、金额大写
    - lua_translator@*force_gc           # 暴力 GC
    - lua_translator@*calculator         # 计算器
  filters:
    - lua_filter@*autocap_filter                     # 英文自动大写
    - lua_filter@*v_filter                           # v 模式 symbols 优先
    - lua_filter@*long_word_filter                   # 长词优先（顺序要求：长词优先 > Emoji）
    - lua_filter@*reduce_english_filter              # 降低部分英语单词在候选项的位置
    - simplifier@emoji                              # Emoji
    - simplifier@chaifen
    - simplifier@chinese_english
    - simplifier@traditionalize                     # 简繁切换
    - simplifier@mars                               # 火星文
    - uniquifier                                    # 去重


# Lua 配置: 日期、时间、星期、ISO 8601、时间戳的触发关键字
date_translator:
  date: rq       # 日期： 2022-11-29
  time: sj       # 时间： 18:13
  week: xq       # 星期： 星期二
  datetime: dt   # ISO 8601： 2022-11-29T18:13:11+08:00
  timestamp: ts  # 时间戳： 1669716794


# Lua 配置：农历的触发关键字
lunar: nl  # 农历： 二〇二三年冬月二十 癸卯年（兔）冬月二十


# Lua 配置：长词优先
long_word_filter:
  count: 2
  idx: 4


# Lua 配置: 降低部分英语单词在候选项的位置。
reduce_english_filter:
  mode: custom  # all | custom | none
  idx: 2
  words: [
    aid, ann,
    bail, bait, bam, band, bans, bat, bay, bend, bent, benz, bib, bid, bien, biz, boc, bop, bos, bud, buf, bach, bench, bush,
    cab, cad, cain, cam, cans, cap, cas, cef, chad, chan, chap, chef, cher, chew, chic, chin, chip, chit, coup, cum, cunt, cur, couch,
    dab, dag, dal, dam, dent, dew, dial, diet, dim, din, dip, dis, dit, doug, dub, dug, dunn, don,
    fab, fax, fob, fog, foul, fur,
    gag, gail, gain, gal, gam, gaol, ged, gel, ger, guam, gus, gut,
    hail, ham, hank, hans, hat, hay, heil, heir, hem, hep, hud, hum, hung, hunk, hut, hush,
    jim, jug,
    kat,
    lab, lad, lag, laid, lam, laos, lap, lat, lax, lay, led, leg, lex, liam, lib, lid, lied, lien, lies, linn, lip, lit, liz, lob, lug, lund, lung, lux, lash, loch, lush,
    mag, maid, mann, mar, mat, med, mel, mend, mens, ment, mil, mins, mint, mob, moc, mop, mos, mot, mud, mug, mum, mesh,
    nap, nat, nay, neil, nib, nip, noun, nous, nun, nut, nail, nash,
    pac, paid, pail, pain, pair, pak, pal, pam, pans, pant, pap, par, pat, paw, pax, pens, pic, pier, pies, pins, pint, pit, pix, pod, pop, pos, pot, pour, pow, pub, pinch, pouch,
    rand, rant, rent, rep, res, ret, rex, rib, rid, rig, rim, rub, rug, rum, runc, runs, ranch,
    sac, sail, sal, sam, sans, sap, saw, sax, sew, sham, shaw, shin, sig, sin, sip, sis, suit, sung, suns, sup, sur, sus,
    tad, tail, taj, tar, tax, tec, ted, tel, ter, tex, tic, tied, tier, ties, tim, tin, tit, tour, tout, tum,
    wag, wand, womens, wap, wax, weir, won,
    yan, yen,
    zach
  ]


# 主翻译器，五笔86
translator:
  dictionary: rime_frost_wubi86
  initial_quality: 1.2
  enable_charset_filter: false
  enable_completion: false
  enable_sentence: false
  enable_user_dict: false
  enable_encoder: false
  encode_commit_history: false
  disable_user_dict_for_patterns:
    - "^z.*$"


# 次翻译器，英文
melt_eng:
  dictionary: melt_eng
  enable_sentence: false
  enable_user_dict: false
  initial_quality: 0.7
  comment_format:
    - xform/.*//


# 自定义短语：custom_phrase.txt
custom_phrase:
  dictionary: ""
  user_dict: custom_phrase
  db_class: stabledb
  enable_completion: false
  enable_sentence: false
  initial_quality: 99


# 显示墨奇码拆分
chaifen:
  option_name: chaifen
  opencc_config: moqi_chaifen.json
  tips: char
  show_in_comment: true
  comment_format:
    - "xform/	/ /"


# 中文转英文
chinese_english:
  option_name: chinese_english
  opencc_config: chinese_english.json
  tips: char
  comment_format:
    - "xform/-/ /"


# Emoji
emoji:
  option_name: emoji
  opencc_config: emoji.json
  inherit_comment: false  # 在 corrector.lua 及反查中，emoji 返回空注释


# 简繁切换
traditionalize:
  option_name: traditionalization
  opencc_config: s2t.json  # s2t.json | s2hk.json | s2tw.json | s2twp.json
  tips: none               # 转换提示: all 都显示 | char 仅单字显示 | none 不显示。
  tags: [ abc, number, gregorian_to_lunar ]  # 限制在对应 tag，不对其他如反查的内容做简繁转换


# 火星文切换
mars:
  opencc_config: martian.json
  option_name: mars


# 标点符号
punctuator:
  full_shape:
    __include: default:/punctuator/full_shape
  half_shape:
    __include: default:/punctuator/half_shape
  symbols:
    __include: symbols_v:/symbols


# 部件拆字反查
radical_lookup:
  tag: radical_lookup
  dictionary: radical_pinyin
  enable_user_dict: false
  prefix: "uU"
  tips: "  〔拆字〕"
  comment_format:
    - erase/^.*$//


# 处理符合特定规则的输入码，如网址、反查
recognizer:
  import_preset: default
  patterns:
    punct: "^/([0-9]|10|[A-Za-z]+)$"
    radical_lookup: "^uU[a-z]+$"
    unicode: "^U[a-f0-9]+"
    number: "^R[0-9]+[.]?[0-9]*"
    gregorian_to_lunar: "^N[0-9]{1,8}"
    calculator: "^V.*$"


# 从 default 继承快捷键
key_binder:
  import_preset: default
  bindings:
    - { when: has_menu, accept: semicolon, send: 2 }


# 拼写设定
speller:
  alphabet: zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA/
  initials: zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA
  delimiter: " '"
  max_code_length: 4
  auto_clear: max_length


menu:
  page_size: 6
